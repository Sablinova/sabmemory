<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sabmemory // neural interface</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
</head>
<body>
  <!-- Scanline Overlay -->
  <div id="scanlines"></div>

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="hud-bracket">[</div>
      <h1>SABMEMORY</h1>
      <span class="header-sub">NEURAL INTERFACE v1.0</span>
      <div class="hud-bracket">]</div>
      <div class="header-pulse"></div>
    </div>
    <nav>
      <button class="nav-btn active" data-view="graph"><span class="nav-icon">&#9670;</span> GRAPH</button>
      <button class="nav-btn" data-view="memories"><span class="nav-icon">&#9632;</span> MEMORIES</button>
      <button class="nav-btn" data-view="entities"><span class="nav-icon">&#9650;</span> ENTITIES</button>
      <button class="nav-btn" data-view="projects"><span class="nav-icon">&#9679;</span> PROJECTS</button>
      <button class="nav-btn" data-view="documents"><span class="nav-icon">&#9644;</span> DOCUMENTS</button>
      <button class="nav-btn" data-view="search"><span class="nav-icon">&#8982;</span> SEARCH</button>
    </nav>
    <div class="header-time" id="header-time"></div>
  </header>

  <!-- Stats Bar -->
  <div id="stats-bar"></div>

  <main>
    <!-- Graph View -->
    <div id="view-graph" class="view active">
      <div class="graph-controls">
        <div class="view-toggle">
          <button class="view-toggle-btn active" data-mode="3d">3D</button>
          <button class="view-toggle-btn" data-mode="2d">2D</button>
        </div>
        <label><input type="checkbox" id="show-obsolete"> OBSOLETE</label>
        <label><input type="checkbox" id="show-forgotten"> FORGOTTEN</label>
        <label>MIN IMP: <input type="range" id="min-importance" min="1" max="10" value="1"><span id="min-imp-val">1</span></label>
        <button id="graph-reset">RESET VIEW</button>
        <div class="graph-legend">
          <span class="legend-item"><span class="legend-dot memory-dot"></span>MEMORY</span>
          <span class="legend-item"><span class="legend-dot entity-dot"></span>ENTITY</span>
          <span class="legend-item"><span class="legend-dot project-dot"></span>PROJECT</span>
        </div>
      </div>
      <div id="graph-container">
        <canvas id="graph-canvas"></canvas>
      </div>
      <div id="graph-tooltip" class="tooltip"></div>
      <div id="graph-hud" class="graph-hud">
        <div class="hud-item">NODES: <span id="hud-nodes">0</span></div>
        <div class="hud-item">EDGES: <span id="hud-edges">0</span></div>
        <div class="hud-item">FPS: <span id="hud-fps">0</span></div>
      </div>
      <div id="graph-info-panel" class="graph-info-panel"></div>
    </div>

    <!-- Memories View -->
    <div id="view-memories" class="view">
      <div class="list-header">
        <h2><span class="section-marker">&#9632;</span> MEMORY BANKS</h2>
        <div class="filters">
          <select id="mem-filter-type">
            <option value="">All types</option>
            <option value="fact">Facts</option>
            <option value="preference">Preferences</option>
            <option value="episode">Episodes</option>
          </select>
          <select id="mem-filter-status">
            <option value="active">Active</option>
            <option value="obsolete">Obsolete</option>
            <option value="forgotten">Forgotten</option>
            <option value="all">All</option>
          </select>
        </div>
      </div>
      <div id="memories-list" class="card-list"></div>
    </div>

    <!-- Memory Detail Modal -->
    <div id="memory-modal" class="modal" hidden>
      <div class="modal-content">
        <div class="modal-corner tl"></div>
        <div class="modal-corner tr"></div>
        <div class="modal-corner bl"></div>
        <div class="modal-corner br"></div>
        <button class="modal-close">&#10005;</button>
        <div id="memory-detail"></div>
      </div>
    </div>

    <!-- Entities View -->
    <div id="view-entities" class="view">
      <h2><span class="section-marker">&#9650;</span> ENTITY REGISTRY</h2>
      <div id="entities-list" class="card-list"></div>
    </div>

    <!-- Projects View -->
    <div id="view-projects" class="view">
      <h2><span class="section-marker">&#9679;</span> PROJECT MATRIX</h2>
      <div id="projects-list" class="card-list"></div>
    </div>

    <!-- Documents View -->
    <div id="view-documents" class="view">
      <h2><span class="section-marker">&#9644;</span> DOCUMENT ARCHIVE</h2>
      <div id="documents-list" class="card-list"></div>
    </div>

    <!-- Search View -->
    <div id="view-search" class="view">
      <h2><span class="section-marker">&#8982;</span> NEURAL SEARCH</h2>
      <div class="search-box">
        <div class="search-input-wrap">
          <span class="search-prompt">&gt;</span>
          <input type="text" id="search-input" placeholder="Search memories..." autocomplete="off">
        </div>
        <button id="search-btn">EXECUTE</button>
      </div>
      <div id="search-results" class="card-list"></div>
    </div>
  </main>

  <footer>
    <span class="footer-left">SABMEMORY::CORE // RUST + SQLITE FTS5</span>
    <span class="footer-right">SYS.MEM: ~6MB // 49 TOOLS ONLINE</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
